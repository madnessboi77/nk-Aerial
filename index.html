<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        var _fetch = window.fetch;
        var desc = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (desc && desc.configurable && !desc.set) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(val) {
              console.warn('Intercepted attempt to assign window.fetch');
              _fetch = val;
            },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {}
    </script>

    <title>Aerial Properties Limited | Premium Real Estate Developer in Bangladesh</title>

  </body>
